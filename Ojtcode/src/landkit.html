<!DOCTYPE html>
<html>
<head>
    <title>Landkit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="favicon" href="../public/images/favicon.ico">
    <style>
        *{
            font-family: Arial;
        }
        body{
        }
        button{
            padding: 10px 15px;
        }
        header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 50px;
            padding-left: 10px;
            padding-right: 10px;
        }
        .title{
            font-size: 35px;
            color: blue;
            font-weight: bold
        }
        .mid-title{
            word-spacing: 8px;
            font-size: 20px;
        }
        .button-head{
            border: none;
            border-radius: 6px;
            background-color: blue;
            color: white;
            height: 35px;
            width: 90px;
        }
        .body-img{
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding-left: 140px;
        }
        .big-text{
            font-size: 50px;
            line-height: 60px;
            word-spacing: 5px;
            font-weight: bold;
            padding-bottom: 20px;
        }
        .mid-text{
            font-size: 20px;
            line-height: 25px;
            padding-bottom: 30px;
        }
        .body-text{
            padding-top: 180px;
        }
        .button-sec1{
            border: none;
            border-radius: 6px;
            background-color: whitesmoke;
            color: black;
            height: 35px;
            margin-right: 10px;
        }
        .button-sec{
            border: none;
            border-radius: 6px;
            background-color: blue;
            color: white;
            height: 35px;
        }
        img{
            height: 600px;
            width: 700px;
        }
        
    </style>
</head>
<body>
    <header>
        <div class="title">Landkit</div>
        <div class="mid-title">
            <span>Landings</span>
            <span>Pages</span>
            <span>Accounts</span>
            <span>Documentation</span>
        </div>
        <div>
            <button class="button-head">Buy Now</button>
        </div>
    </header>
    <section>
        <div class="body-img">
            <div class="body-text">
            <div class="big-text">Welcome to <sapn style="color: blue;">LandKit.</sapn><br>Develope anything </div>
            <div class="mid-text">Build a beautiful,modern website with flexible<br>Bootstrap components Built from scaratch</div>
            <button class="button-sec">View All Pages <span class="bi bi-arrow-right"></span></button>
            <button class="button-sec1">Documentation</button>
            </div>
        <div>
            <img src="../public/images/land1kit.png">
        </div>
        </div>
    </section>
</body>
</html>
