<!DOCTYPE html>
<html>
    <head>

            }
            .rating{
                margin-top: 10px;
                color: rgb(218, 165, 32);

            img{
                padding-left: 10px 10px;
            }
            .bigtext{
                padding: 10px;
            }
        </style>

        <div class="card">

                <div>

                <div class="sub-title" style="font-weight: bold; font-size: 18px;">Low Top Sneaker</div>
            
            <div class="rating">
                <span class="bi bi-star-fill"></span>

            </div>
            </div>
            </div>
            <div class="bigtext">

        </div>

</html>
